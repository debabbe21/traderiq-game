<style>
  :root {
    --bg-primary: #0a0e17;
    --bg-secondary: #111827;
    --bg-card: #1a2332;
    --bg-card-hover: #1f2b3d;
    --border: #2a3548;
    --text-primary: #e5e7eb;
    --text-secondary: #9ca3af;
    --text-muted: #6b7280;
    --accent: #3b82f6;
    --accent-hover: #2563eb;
    --green: #10b981;
    --green-bg: rgba(16, 185, 129, 0.1);
    --red: #ef4444;
    --red-bg: rgba(239, 68, 68, 0.1);
    --yellow: #f59e0b;
    --yellow-bg: rgba(245, 158, 11, 0.1);
    --purple: #8b5cf6;
    --gold: #fbbf24;
    --silver: #d1d5db;
    --bronze: #d97706;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    min-height: 100vh;
    overflow-x: hidden;
  }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg-secondary); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .mode-selector {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    min-height: 100vh; gap: 40px; padding: 20px;
    background: radial-gradient(ellipse at center, #111827 0%, #0a0e17 70%);
  }

  .logo-section { text-align: center; margin-bottom: 20px; }
  .logo-section h1 { font-size: 3rem; font-weight: 900; letter-spacing: -1px; line-height: 1.2; }
  .logo-svg { display: inline-block; vertical-align: middle; }
  .logo-svg-header { height: 30px; width: auto; }
  .logo-svg-main { height: 56px; width: auto; }
  .logo-section .subtitle { font-size: 1.2rem; color: var(--text-secondary); margin-top: 8px; font-weight: 300; }

  .header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 12px 24px; background: var(--bg-secondary); border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 100;
  }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .header-right { display: flex; align-items: center; gap: 12px; }
  .header-badge {
    padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 700;
    background: var(--accent); color: white; letter-spacing: 0.5px;
  }
  .header-round { font-size: 0.85rem; color: var(--text-secondary); }

  .main-content { max-width: 1200px; margin: 0 auto; padding: 20px; }

  .btn {
    padding: 8px 16px; border-radius: 8px; border: none; cursor: pointer;
    font-family: inherit; font-weight: 600; font-size: 0.85rem; transition: all 0.2s;
  }
  .btn-primary { background: var(--accent); color: white; }
  .btn-primary:hover { background: var(--accent-hover); }
  .btn-success { background: var(--green); color: white; }
  .btn-danger { background: var(--red); color: white; }
  .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-secondary); }
  .btn-outline:hover { border-color: var(--text-primary); color: var(--text-primary); }
  .btn-large { padding: 12px 24px; font-size: 1rem; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .card {
    background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 20px;
  }
  .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
  .card-title { font-weight: 700; font-size: 0.95rem; }

  .section { margin-bottom: 20px; }

  .stock-prices { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
  .stock-card {
    background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px;
    padding: 16px; text-align: center;
  }
  .stock-name { font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 4px; font-weight: 600; }
  .stock-price { font-size: 1.5rem; font-weight: 900; margin-bottom: 4px; }
  .stock-change { font-size: 0.85rem; font-weight: 600; margin-bottom: 8px; }
  .stock-beta { font-size: 0.7rem; color: var(--text-muted); }
  .position-badge { font-size: 0.7rem; background: var(--accent); color: white; padding: 2px 6px; border-radius: 10px; margin-left: 4px; }

  .positive { color: var(--green); }
  .negative { color: var(--red); }

  .grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
  .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }

  .dice-section { text-align: center; }
  .dice-container { display: flex; justify-content: center; gap: 24px; margin: 16px 0; }
  .die-wrapper { text-align: center; }
  .die-label { font-size: 0.75rem; color: var(--text-muted); margin-bottom: 6px; }
  .die {
    width: 56px; height: 56px; background: var(--bg-secondary); border: 2px solid var(--border);
    border-radius: 12px; display: flex; align-items: center; justify-content: center;
    font-size: 1.5rem; font-weight: 900; margin: 0 auto;
  }
  .die-change { font-size: 0.8rem; font-weight: 700; margin-top: 6px; }
  .die.rolling { animation: roll 0.6s ease-out; }
  @keyframes roll { 0% { transform: rotateZ(0); } 50% { transform: rotateZ(180deg) scale(1.2); } 100% { transform: rotateZ(360deg); } }

  .tabs { display: flex; gap: 4px; padding: 4px; background: var(--bg-secondary); border-radius: 10px; }
  .tab {
    flex: 1; padding: 10px; border: none; background: transparent; color: var(--text-muted);
    font-family: inherit; font-weight: 600; font-size: 0.8rem; border-radius: 8px; cursor: pointer;
    transition: all 0.2s;
  }
  .tab.active { background: var(--bg-card); color: var(--text-primary); }

  .leaderboard-item {
    display: flex; align-items: center; gap: 12px; padding: 10px 0;
    border-bottom: 1px solid var(--border);
  }
  .leaderboard-item:last-child { border-bottom: none; }
  .leaderboard-rank {
    width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center;
    justify-content: center; font-weight: 800; font-size: 0.85rem; flex-shrink: 0;
  }
  .rank-1 { background: var(--gold); color: #000; }
  .rank-2 { background: var(--silver); color: #000; }
  .rank-3 { background: var(--bronze); color: #fff; }
  .rank-other { background: var(--bg-secondary); color: var(--text-muted); }
  .leaderboard-name { font-weight: 600; flex: 1; }
  .leaderboard-bar { flex: 2; height: 8px; background: var(--bg-secondary); border-radius: 4px; overflow: hidden; }
  .leaderboard-bar-fill { height: 100%; border-radius: 4px; transition: width 0.5s; }
  .leaderboard-value { font-weight: 800; text-align: right; }

  .data-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
  .data-table th { text-align: left; padding: 8px; color: var(--text-muted); border-bottom: 1px solid var(--border); font-weight: 600; font-size: 0.75rem; text-transform: uppercase; }
  .data-table td { padding: 8px; border-bottom: 1px solid rgba(42,53,72,0.3); }

  .empty-state { text-align: center; padding: 30px; color: var(--text-muted); }
  .empty-icon { font-size: 2rem; margin-bottom: 8px; }

  .notification {
    position: fixed; top: 20px; right: 20px; padding: 12px 20px; border-radius: 10px;
    background: var(--bg-card); border: 1px solid var(--green); color: var(--text-primary);
    font-size: 0.85rem; font-weight: 500; z-index: 1000; animation: slideIn 0.3s;
    max-width: 400px;
  }
  @keyframes slideIn { from { transform: translateX(100px); opacity: 0; } }

  .form-group { margin-bottom: 12px; }
  .form-group label { display: block; font-size: 0.75rem; color: var(--text-muted); margin-bottom: 4px; font-weight: 600; text-transform: uppercase; }
  .form-group input, .form-group select {
    width: 100%; padding: 8px 12px; background: var(--bg-secondary); border: 1px solid var(--border);
    color: var(--text-primary); border-radius: 8px; font-family: inherit; font-size: 0.9rem;
  }
  .form-group input:focus, .form-group select:focus { outline: none; border-color: var(--accent); }

  .team-name-input {
    padding: 14px 20px; background: var(--bg-card); border: 2px solid var(--border);
    color: var(--text-primary); border-radius: 12px; font-family: inherit; font-size: 1.1rem;
    text-align: center; font-weight: 600;
  }
  .team-name-input:focus { outline: none; border-color: var(--accent); }

  .stat-label { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; font-weight: 600; margin-bottom: 4px; }
  .stat-value { font-size: 1.3rem; font-weight: 800; }

  .trade-tag { padding: 2px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: 700; }
  .trade-tag.buy { background: var(--green-bg); color: var(--green); }
  .trade-tag.sell { background: var(--red-bg); color: var(--red); }

  .option-chain { margin-top: 12px; }
  .option-row { display: grid; grid-template-columns: 1fr auto 1fr; border-bottom: 1px solid rgba(42,53,72,0.3); }
  .option-row:last-child { border-bottom: none; }
  .calls-side, .puts-side { display: flex; justify-content: space-between; padding: 6px 10px; cursor: pointer; transition: background 0.2s; }
  .calls-side:hover { background: rgba(16,185,129,0.05); }
  .puts-side:hover { background: rgba(239,68,68,0.05); }
  .strike { padding: 6px 10px; text-align: center; font-weight: 700; font-size: 0.85rem; background: var(--bg-secondary); }
  .strike.atm { color: var(--yellow); }
  .option-label { font-size: 0.7rem; color: var(--text-muted); }
  .option-price { font-weight: 600; font-size: 0.85rem; }

  .chain-tabs { display: flex; gap: 8px; margin-bottom: 12px; }
  .chain-tab { padding: 6px 16px; border-radius: 8px; border: 1px solid var(--border); background: transparent; color: var(--text-secondary); font-family: inherit; font-weight: 600; font-size: 0.8rem; cursor: pointer; }
  .chain-tab.active { background: var(--accent); color: white; border-color: var(--accent); }

  .team-overview-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 8px; }
  .team-mini-card { background: var(--bg-secondary); border-radius: 8px; padding: 10px; text-align: center; }
  .team-mini-name { font-size: 0.75rem; color: var(--text-muted); margin-bottom: 4px; font-weight: 600; }

  .connection-status {
    position: fixed; bottom: 12px; left: 12px; padding: 6px 12px; border-radius: 20px;
    font-size: 0.7rem; font-weight: 600; z-index: 1000;
  }
  .connected { background: var(--green-bg); color: var(--green); border: 1px solid var(--green); }
  .disconnected { background: var(--red-bg); color: var(--red); border: 1px solid var(--red); }

  .fade-in { animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } }

  @media (max-width: 768px) {
    .stock-prices { grid-template-columns: 1fr; }
    .grid-2, .grid-3 { grid-template-columns: 1fr; }
    .header { flex-wrap: wrap; gap: 8px; }
    .dice-container { gap: 12px; }
  }
</style>
</head>

// ====== WEBSOCKET ======
let ws = null;
let reconnectTimer = null;

function connect() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(`${proto}//${location.host}`);

  ws.onopen = () => {
    console.log('Connected');
    updateConnectionStatus(true);
    // Re-join if we had a role
    if (role === 'team' && teamName) {
      ws.send(JSON.stringify({ action: 'join_team', teamName }));
    } else if (role === 'admin') {
      ws.send(JSON.stringify({ action: 'join_admin', password: '2013' }));
    }
  };

  ws.onmessage = (e) => {
    try {
      const msg = JSON.parse(e.data);
      handleServerMessage(msg);
    } catch (err) {
      console.error('Parse error:', err);
    }
  };

  ws.onclose = () => {
    updateConnectionStatus(false);
    reconnectTimer = setTimeout(connect, 2000);
  };

  ws.onerror = () => {
    ws.close();
  };
}

function send(msg) {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify(msg));
  }
}

function updateConnectionStatus(connected) {
  const el = document.getElementById('connection-status');
  if (connected) {
    el.className = 'connection-status connected';
    el.innerHTML = '🟢 Verbunden';
  } else {
    el.className = 'connection-status disconnected';
    el.innerHTML = '🔴 Verbindung unterbrochen...';
  }
}

// ====== MESSAGE HANDLING ======
function handleServerMessage(msg) {
  switch (msg.type) {
    case 'joined':
      role = msg.role;
      if (msg.teamName) teamName = msg.teamName;
      render();
      break;

    case 'game_update':
      gameData = msg.state;
      render();
      break;

    case 'dice_rolled':
      // Animate dice
      setTimeout(() => {
        const dieEls = document.querySelectorAll('.die');
        dieEls.forEach(el => {
          el.classList.add('rolling');
          setTimeout(() => el.classList.remove('rolling'), 600);
        });
      }, 50);
      showNotification(`🎲 Runde ${msg.round} gewürfelt! A=${msg.prices.A}€ B=${msg.prices.B}€ C=${msg.prices.C}€`);
      break;

    case 'game_ended':
      showNotification('🏁 Spiel beendet!');
      break;

    case 'reset':
      role = null;
      teamName = '';
      gameData = null;
      render();
      showNotification('🔄 Spiel wurde zurückgesetzt');
      break;

    case 'error':
      showNotification('⚠️ ' + msg.message, 'error');
      break;
  }
}

// ====== HELPERS ======
function formatCurrency(value) {
  return new Intl.NumberFormat('de-DE', { style: 'currency', currency: 'EUR', minimumFractionDigits: 0, maximumFractionDigits: 2 }).format(value);
}

function formatNumber(value) {
  return new Intl.NumberFormat('de-DE', { minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(value);
}

function showNotification(text, type = 'success') {
  const area = document.getElementById('notification-area');
  const el = document.createElement('div');
  el.className = 'notification';
  el.style.borderColor = type === 'error' ? 'var(--red)' : 'var(--green)';
  el.textContent = text;
  area.appendChild(el);
  setTimeout(() => { try { el.remove(); } catch(e) {} }, 3500);
}

function diceToChange(dice, beta) {
  return DICE_MULTIPLIERS[dice - 1] * beta;
}

function generateOptionChain(currentPrice, beta, roundsRemaining) {
  const step = Math.max(1, Math.round(beta * 1.5));
  const nSteps = 4;
  const chain = [];
  for (let i = -nSteps; i <= nSteps; i++) {
    const strike = Math.round(currentPrice / step) * step + i * step;
    if (strike <= 0) continue;
    const diff = currentPrice - strike;
    const timeValue = Math.max(0, roundsRemaining * beta * 0.15);
    let callPrice, putPrice;
    const base = beta * 0.4;
    if (diff >= 0) {
      callPrice = diff + timeValue + base;
      putPrice = timeValue + base - diff * 0.3;
    } else {
      putPrice = Math.abs(diff) + timeValue + base;
      callPrice = Math.abs(diff) * step + (4 - nSteps) * base * step / 60;
    }
    chain.push({
      strike, isATM: false,
      call: Math.max(0.01, Math.round(callPrice * 100) / 100),
      put: Math.max(0.01, Math.round(putPrice * 100) / 100)
    });
  }
  return chain;
}

// ====== RENDERING ======
function render() {
  try {
    Object.values(charts).forEach(c => { try { if (c && c.destroy) c.destroy(); } catch(e) {} });
    charts = {};
    const app = document.getElementById('app');

    if (!role) {
      app.innerHTML = renderLogin();
    } else if (gameData && gameData.gameEnded) {
      app.innerHTML = renderEndScreen();
      setTimeout(initCharts, 50);
    } else if (role === 'admin') {
      app.innerHTML = renderAdminView();
      setTimeout(initCharts, 50);
    } else if (role === 'team') {
      app.innerHTML = renderTeamView();
      setTimeout(initCharts, 50);
    }
  } catch(e) {
    console.error('Render error:', e);
    document.getElementById('app').innerHTML = `<div style="padding:40px;text-align:center;color:var(--red);"><h2>Darstellungsfehler</h2><p>${e.message}</p><button class="btn btn-primary" onclick="location.reload()">Seite neu laden</button></div>`;
  }
}

  const remaining = gameData.maxRounds - gameData.currentRound;
  if (orderForm.type === 'stock') {
    const total = price * orderForm.quantity;
    return `<div style="padding:16px;background:var(--bg-secondary);border-radius:8px;">
      <div style="display:flex;justify-content:space-between;margin-bottom:8px;"><span style="color:var(--text-secondary);">Instrument</span><strong>${STOCKS[orderForm.stock].name}</strong></div>
      <div style="display:flex;justify-content:space-between;margin-bottom:8px;"><span style="color:var(--text-secondary);">Kurs</span><strong>${formatCurrency(price)}</strong></div>
      <div style="display:flex;justify-content:space-between;margin-bottom:8px;"><span style="color:var(--text-secondary);">Anzahl</span><strong>${orderForm.quantity} Stk.</strong></div>
      <div style="display:flex;justify-content:space-between;padding-top:8px;border-top:1px solid var(--border);"><span style="font-weight:600;">Gesamt</span><strong style="font-size:1.1rem;">${formatCurrency(total)}</strong></div>
    </div>`;
  } else {
    const chain = generateOptionChain(price, STOCKS[orderForm.stock].beta, remaining);
    const selectedStrike = orderForm.strike || chain.find(c => !c.isATM)?.strike;
    const option = chain.find(c => c.strike === selectedStrike);
    const optPrice = option ? (orderForm.optionType === 'call' ? option.call : option.put) : 0;
    const total = optPrice * orderForm.quantity * 100;
    return `<div style="padding:16px;background:var(--bg-secondary);border-radius:8px;">
      <div style="display:flex;justify-content:space-between;margin-bottom:8px;"><span style="color:var(--text-secondary);">Option</span><strong>${orderForm.optionType.toUpperCase()} ${STOCKS[orderForm.stock].name}</strong></div>
      <div style="display:flex;justify-content:space-between;margin-bottom:8px;"><span style="color:var(--text-secondary);">Strike</span><strong>${selectedStrike ? formatCurrency(selectedStrike) : '-'}</strong></div>
      <div style="display:flex;justify-content:space-between;margin-bottom:8px;"><span style="color:var(--text-secondary);">Prämie</span><strong>${formatCurrency(optPrice)} / Stk.</strong></div>
      <div style="display:flex;justify-content:space-between;margin-bottom:8px;"><span style="color:var(--text-secondary);">Kontrakte</span><strong>${orderForm.quantity} (= ${orderForm.quantity*100} Stk.)</strong></div>
      <div style="display:flex;justify-content:space-between;padding-top:8px;border-top:1px solid var(--border);"><span style="font-weight:600;">Gesamt</span><strong style="font-size:1.1rem;">${formatCurrency(total)}</strong></div>
    </div>`;
  }
}

function submitOrder() {
  const prices = gameData.prices;
  const price = prices[orderForm.stock];
  if (orderForm.type === 'stock') {
    send({ action: 'trade', tradeType: 'stock', stock: orderForm.stock, quantity: orderForm.quantity, direction: orderForm.direction });
  } else {
    const remaining = gameData.maxRounds - gameData.currentRound;
    const chain = generateOptionChain(price, STOCKS[orderForm.stock].beta, remaining);
    const strike = orderForm.strike || chain.find(c => !c.isATM)?.strike;
    const option = chain.find(c => c.strike === strike);
    if (!option) { showNotification('Bitte Strike wählen!', 'error'); return; }
    const optPrice = orderForm.optionType === 'call' ? option.call : option.put;
    send({ action: 'trade', tradeType: 'option', stock: orderForm.stock, quantity: orderForm.quantity, direction: orderForm.direction, optionType: orderForm.optionType, strike, premium: optPrice });
  }
}

function renderOptionsTab(prices) {
  if (gameData.currentRound === 0) {
    return '<div class="card section"><div class="empty-state"><div class="empty-icon">⏳</div><p>Optionsketten werden nach der ersten Runde angezeigt.</p></div></div>';
  }
  const remaining = gameData.maxRounds - gameData.currentRound;
  const currentPrice = prices[selectedChainStock];
  const chain = generateOptionChain(currentPrice, STOCKS[selectedChainStock].beta, remaining);
  return `
    <div class="card section">
      <div class="card-header"><span class="card-title">📊 Optionsketten</span></div>
      <div class="chain-tabs">
        ${['A','B','C'].map(s => `<button class="chain-tab ${selectedChainStock===s?'active':''}" onclick="selectedChainStock='${s}';render()">${STOCKS[s].name} - ${formatCurrency(prices[s])}</button>`).join('')}
      </div>
      <div class="option-chain">
        <div class="option-row" style="font-weight:700;font-size:0.75rem;color:var(--text-muted);">
          <div style="display:flex;justify-content:space-between;padding:6px 10px;"><span style="color:var(--green);">CALLS</span><span>Preis</span></div>
          <div class="strike" style="background:transparent;">STRIKE</div>
          <div style="display:flex;justify-content:space-between;padding:6px 10px;"><span>Preis</span><span style="color:var(--red);">PUTS</span></div>
        </div>
        ${chain.map(row => `
          <div class="option-row">
            <div class="calls-side" onclick="quickBuy('call','${selectedChainStock}',${row.strike},${row.call})">
              <span class="option-label">${row.strike > currentPrice ? 'OTM' : 'ITM'}</span>
              <span class="option-price" style="color:var(--green)">${formatNumber(row.call)} €</span>
            </div>
            <div class="strike">${formatCurrency(row.strike)}</div>
            <div class="puts-side" onclick="quickBuy('put','${selectedChainStock}',${row.strike},${row.put})">
              <span class="option-price" style="color:var(--red)">${formatNumber(row.put)} €</span>
              <span class="option-label">${row.strike < currentPrice ? 'OTM' : 'ITM'}</span>
            </div>
          </div>
        `).join('')}
      </div>
      <div style="margin-top:12px;font-size:0.75rem;color:var(--text-muted);text-align:center;">Klicke auf einen Preis um einen Trade zu platzieren | 1 Kontrakt = 100 Aktien</div>
    </div>
  `;
}

function quickBuy(type, stock, strike, price) {
  orderForm.type = 'option'; orderForm.stock = stock; orderForm.optionType = type;
  orderForm.strike = strike; orderForm.direction = 'buy'; orderForm.quantity = 1;
  teamTab = 'trade'; render();
}

function renderHistoryTab(t) {
  if (!t.trades || t.trades.length === 0) {
    return '<div class="card section"><div class="empty-state"><div class="empty-icon">📝</div><p>Noch keine Trades</p></div></div>';
  }
  return `
    <div class="card section">
      <div class="card-header"><span class="card-title">📝 Trade-Verlauf</span><span style="color:var(--text-muted);font-size:0.8rem;">${t.trades.length} Trades</span></div>
      <table class="data-table">
        <tr><th>Runde</th><th>Typ</th><th>Instrument</th><th>Richtung</th><th>Anzahl</th><th>Preis</th><th>Gesamt</th></tr>
        ${[...t.trades].reverse().map(tr => `
          <tr>
            <td>R${tr.round}</td>
            <td>${tr.type==='stock'?'📈 Aktie':`📋 ${tr.optionType.toUpperCase()}`}</td>
            <td><strong style="color:${STOCKS[tr.stock].color}">${STOCKS[tr.stock].name}</strong>
              ${tr.type==='option'?`<br><span style="font-size:0.75rem;color:var(--text-muted)">Strike: ${formatCurrency(tr.strike)}</span>`:''}</td>
            <td><span class="trade-tag ${tr.direction}">${tr.direction==='buy'?'KAUF':'VERKAUF'}</span></td>
            <td>${tr.quantity}${tr.type==='option'?' Kontr.':' Stk.'}</td>
            <td>${formatCurrency(tr.price)}</td>
            <td><strong>${formatCurrency(tr.total)}</strong></td>
          </tr>
        `).join('')}
      </table>
    </div>
  `;
}

// ====== LEADERBOARD ======
function renderLeaderboard(lb) {
  if (!lb || lb.length === 0) {
    return '<div class="empty-state"><div class="empty-icon">🏆</div><p>Noch keine Teams beigetreten</p></div>';
  }
  const maxVal = lb[0]?.value || 1;
  return lb.map((team, i) => {
    const rankClass = i===0?'rank-1':i===1?'rank-2':i===2?'rank-3':'rank-other';
    const barColor = i===0?'var(--gold)':i===1?'var(--silver)':i===2?'var(--bronze)':'var(--accent)';
    const pct = (team.value / maxVal * 100).toFixed(0);
    const changeFromStart = team.value - 100000;
    const cls = changeFromStart >= 0 ? 'positive' : 'negative';
    return `
      <div class="leaderboard-item">
        <div class="leaderboard-rank ${rankClass}">${i+1}</div>
        <div class="leaderboard-name">${team.name}</div>
        <div class="leaderboard-bar"><div class="leaderboard-bar-fill" style="width:${pct}%;background:${barColor};"></div></div>
        <div>
          <div class="leaderboard-value">${formatCurrency(team.value)}</div>
          <div class="${cls}" style="font-size:0.75rem;text-align:right;">${changeFromStart >= 0?'+':''}${formatCurrency(changeFromStart)}</div>
        </div>
      </div>`;
  }).join('');
}

// ====== END SCREEN ======
function renderEndScreen() {
  if (!gameData) return '';
  const d = gameData;
  const prices = {};
  ['A','B','C'].forEach(s => { prices[s] = d.stockPrices[s][d.stockPrices[s].length-1]; });

  let teamSection = '';
  if (role === 'team' && d.team) {
    const t = d.team;
    let depot = 0;
    ['A','B','C'].forEach(s => { depot += t.positions[s] * prices[s]; });
    const totalVal = depot + t.cash;
    const change = totalVal - 100000;
    const cls = change >= 0 ? 'positive' : 'negative';
    teamSection = `
      <p style="color:var(--text-secondary);font-size:1rem;">Team <strong>${t.name}</strong> – Endstand:</p>
      <div style="font-size:2.5rem;font-weight:900;margin:16px 0;" class="${cls}">${formatCurrency(totalVal)}</div>
      <div class="${cls}" style="font-size:1.1rem;font-weight:600;">${change>=0?'+':''}${formatCurrency(change)} (${change>=0?'+':''}${(change/1000).toFixed(1)}%)</div>
    `;
  }

  return `
    <div class="header">
      <div class="header-left">
        <span class="header-logo">${logoHTML('logo-svg logo-svg-header')}</span>
        <span class="header-badge" style="background:var(--gold);color:#000;">${role==='admin'?'SPIELLEITER':(d.team?.name||'')}</span>
        <span class="header-round" style="color:var(--gold);font-weight:700;">SPIEL BEENDET</span>
      </div>
      <div class="header-right">
        <button class="btn btn-outline" onclick="logout()">← Zurück</button>
        ${role==='admin'?`<button class="btn btn-outline" onclick="if(confirm('Neues Spiel starten?'))send({action:'reset_game'})">🔄 Neues Spiel</button>`:''}
      </div>
    </div>
    <div class="main-content fade-in">
      <div class="card section" style="text-align:center;padding:40px;border-color:var(--gold);background:rgba(251,191,36,0.05);">
        <div style="font-size:3rem;margin-bottom:12px;">🏁</div>
        <h2 style="font-size:1.8rem;font-weight:900;margin-bottom:8px;">Spiel beendet nach ${d.maxRounds} Runden!</h2>
        ${teamSection}
      </div>

      <div class="card section">
        <div class="card-header"><span class="card-title">📈 Aktienkurse – Entwicklung</span></div>
        <div class="grid-3">
          ${['A','B','C'].map(s => {
            const endPrice = prices[s]; const change = endPrice - 100;
            const cls = change >= 0 ? 'positive' : 'negative';
            return `<div class="card" style="text-align:center;">
              <div style="font-size:0.85rem;color:var(--text-secondary);">${STOCKS[s].name}</div>
              <div style="font-size:1.4rem;font-weight:800;color:${STOCKS[s].color};">${formatCurrency(endPrice)}</div>
              <div class="${cls}" style="font-size:0.85rem;font-weight:600;">${change>=0?'+':''}${formatCurrency(change)}</div>
            </div>`;
          }).join('')}
        </div>
        <div style="margin-top:16px;">
          ${['A','B','C'].map(s => `<canvas id="chart-${s}" style="margin-bottom:8px;"></canvas>`).join('')}
        </div>
      </div>

      <div class="card section" style="border-color:var(--gold);">
        <div class="card-header"><span class="card-title">🏆 Endergebnis – Leaderboard</span></div>
        ${renderLeaderboard(d.leaderboard)}
      </div>
    </div>
  `;
}

// ====== CHARTS ======
function initCharts() {
  charts = {};
  try {
    ['A','B','C'].forEach(s => {
      const canvas = document.getElementById(`chart-${s}`);
      if (!canvas) return;
      const ctx = canvas.getContext('2d');
      const priceData = gameData.stockPrices[s];
      const labels = priceData.map((_, i) => i===0?'Start':`R${i}`);
      charts[s] = new Chart(ctx, {
        type: 'line',
        data: { labels, datasets: [{ data: priceData, borderColor: STOCKS[s].color, backgroundColor: `rgba(${STOCKS[s].colorRgb}, 0.1)`, fill: true, tension: 0.3, pointRadius: 3, pointBackgroundColor: STOCKS[s].color, borderWidth: 2 }] },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { display: false }, y: { display: true, grid: { color: 'rgba(42,53,72,0.3)' }, ticks: { color: '#6b7280', font: { size: 10 }, callback: v => v + '€' } } }, interaction: { intersect: false, mode: 'index' } }
      });
    });

    const portfolioCanvas = document.getElementById('chart-portfolio');
    if (portfolioCanvas && gameData.team) {
      const ctx = portfolioCanvas.getContext('2d');
      const t = gameData.team;
      const labels = t.totalHistory.map((_, i) => i===0?'Start':`R${i}`);
      charts.portfolio = new Chart(ctx, {
        type: 'line',
        data: { labels, datasets: [
          { label: 'Gesamt', data: t.totalHistory, borderColor: '#3b82f6', backgroundColor: 'rgba(59,130,246,0.1)', fill: true, tension: 0.3, borderWidth: 2 },
          { label: 'Barmittel', data: t.cashHistory, borderColor: '#10b981', borderDash: [5,5], tension: 0.3, borderWidth: 1.5, pointRadius: 0 }
        ] },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { labels: { color: '#9ca3af', font: { size: 11 } } } }, scales: { x: { grid: { color: 'rgba(42,53,72,0.3)' }, ticks: { color: '#6b7280', font: { size: 10 } } }, y: { grid: { color: 'rgba(42,53,72,0.3)' }, ticks: { color: '#6b7280', font: { size: 10 }, callback: v => (v/1000)+'k€' } } } }
      });
    }
  } catch(e) {
    console.warn('Chart init error (non-critical):', e);
  }
}

// ====== START ======
connect();
render();
</script>
</body>
</html>
